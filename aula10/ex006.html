<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events DOM</title>
    <style>
    div#area {
        font: normal 20pt Arial;
        background: rgb(10, 130, 40);
        color: white;
        width: 200px;
        height: 200px;
        line-height:200px;
        text-align: center;

    }
    </style>
</head>
<body>
    <div id= "area">
    <!--onclick=" click_here()" onmouseout="Sair()" onmousemove="mover()"> -->
        interaja...
    </div>

    <script>
        const a = window.document.querySelector("#area");
        a.addEventListener('mouseout', Sair)
        a.addEventListener('mousemove', mover)
        a.addEventListener('click', click_here)
        
        
         function click_here() {
            a.innerText = 'clicou'
            a.style.background = 'red'
        }
        
        function Sair() {
            a.innerText = 'fora'
            a.style.background = 'blue'
        }
        function mover() {
            a.innerText = 'dentro'
            a.style.background = 'green'
        }
        
    </script>
    
</body>
</html>
